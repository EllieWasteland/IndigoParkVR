<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Park VR - Launcher</title>
    <!-- Tailwind CSS en local -->
    <script src="tailwind.js"></script>

    <style>
        body {
            /* Fuente offline basada en el sistema */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .pulse-ring { animation: pulseRing 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        body.draggable { cursor: grab; }
        body.draggable:active { cursor: grabbing; }
    </style>
</head>

<body class="draggable h-screen w-screen m-0 bg-[url('background.jpg')] bg-cover bg-center bg-gray-900">

    <div class="absolute inset-0 bg-black/70 backdrop-blur-md z-0 pointer-events-none"></div>

    <main class="w-full h-full relative overflow-hidden flex flex-col items-center justify-center z-10">

        <!-- BOTÓN CERRAR SUPERIOR DERECHO -->
        <button onclick="closeApp()" class="absolute top-4 right-4 z-50 text-white/50 hover:text-white transition-colors focus:outline-none cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 bg-white/10 rounded-full p-1 border border-white/20 hover:bg-red-500/50 hover:border-red-500 transition-all"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>

        <div class="relative z-10 w-full px-8 flex flex-col items-center pointer-events-none">

            <!-- HEADER -->
            <div class="text-center mb-8 pointer-events-auto">
                <h1 class="text-3xl font-bold text-white tracking-tight drop-shadow-lg">Indigo Park VR</h1>
                <p class="text-white/60 text-sm mt-1 font-medium tracking-widest uppercase" id="status-text">Iniciando sistema...</p>
            </div>

            <!-- VISTA 0: COMPROBANDO ARCHIVOS -->
            <div id="checking-view" class="w-full max-w-md flex flex-col items-center justify-center py-8 fade-in pointer-events-auto">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-12 h-12 text-indigo-400/80 animate-spin mb-4"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                <h2 id="checking-text" class="text-white font-medium text-sm tracking-widest uppercase">VERIFICANDO ARCHIVOS...</h2>
            </div>

            <!-- VISTA 1: BOTONES (Oculto inicialmente) -->
            <div id="main-menu" class="hidden w-full max-w-md flex-col gap-4 fade-in pointer-events-auto">

                <button onclick="launchGame('vr')" class="group relative w-full p-5 rounded-2xl bg-white/5 border border-indigo-500/30 hover:bg-indigo-500/10 hover:border-indigo-500/60 transition-all duration-300 flex items-center gap-5 cursor-pointer shadow-lg overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/0 via-indigo-500/10 to-indigo-500/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="bg-gradient-to-br from-indigo-500/20 to-indigo-500/5 p-3 rounded-xl border border-indigo-500/30 shadow-inner group-hover:scale-110 transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-indigo-300"><path d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5Zm0 0a9 9 0 1 1 18 0m0 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3Z"/><path d="M21 16v2a4 4 0 0 1-4 4h-5"/></svg>
                    </div>
                    <div class="text-left flex-1 relative z-10">
                        <h2 id="btn-vr-title" class="text-white font-semibold text-lg">Iniciar en Realidad Virtual</h2>
                        <p id="btn-vr-desc" class="text-white/50 text-xs mt-0.5">Inyecta UEVR automáticamente</p>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-white/30 group-hover:text-indigo-300 transition-colors relative z-10"><path d="m9 18 6-6-6-6"/></svg>
                </button>

                <button onclick="launchGame('flat')" class="group w-full p-5 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/30 transition-all duration-300 flex items-center gap-5 cursor-pointer shadow-lg">
                    <div class="bg-gradient-to-br from-white/10 to-white/5 p-3 rounded-xl border border-white/10 shadow-inner group-hover:scale-110 transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-blue-200"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M12 17v4"/><path d="M8 21h8"/><path d="m10 7 5 3-5 3Z"/></svg>
                    </div>
                    <div class="text-left flex-1">
                        <h2 id="btn-flat-title" class="text-white font-semibold text-lg">Jugar Original (Flat)</h2>
                        <p id="btn-flat-desc" class="text-white/50 text-xs mt-0.5">Inicia el juego base sin mods</p>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-white/30 group-hover:text-white/70 transition-colors"><path d="m9 18 6-6-6-6"/></svg>
                </button>

                <button id="btn-cancel" onclick="closeApp()" class="mt-2 text-white/40 hover:text-white text-sm font-medium transition-colors cursor-pointer w-max mx-auto px-4 py-2 rounded-full hover:bg-white/5">
                    Cancelar
                </button>
            </div>

            <!-- VISTA 2: ANIMACIÓN DE CARGA VR/FLAT -->
            <div id="loading-vr" class="hidden w-full flex-col items-center justify-center py-6 fade-in pointer-events-auto">
                <div class="relative flex items-center justify-center w-full h-32 mb-4">
                    <div class="absolute w-40 h-40 bg-indigo-500/30 rounded-full blur-2xl pulse-ring"></div>
                    <div class="relative z-10 p-5 bg-gradient-to-br from-white/10 to-transparent border border-white/20 rounded-3xl backdrop-blur-md float-anim shadow-2xl" id="main-icon-container">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16 text-indigo-200"><path d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5Zm0 0a9 9 0 1 1 18 0m0 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3Z"/><path d="M21 16v2a4 4 0 0 1-4 4h-5"/></svg>
                    </div>
                    <div class="absolute bottom-4 right-1/3 p-2 bg-white/5 border border-white/10 rounded-xl backdrop-blur-md float-anim shadow-lg" style="animation-delay: 1s;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-white/70"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                    </div>
                </div>
                <div class="flex items-center gap-2 text-indigo-300 font-medium bg-indigo-500/10 px-4 py-2 rounded-full border border-indigo-500/20" id="vr-status-container">
                    <span id="vr-spinner-container">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    </span>
                    <span id="vr-status-text">Iniciando juego e inyectando motor...</span>
                </div>
                
                <p id="vr-warning-text" class="hidden text-white/80 text-xs mt-5 text-center px-4 py-2.5 bg-red-500/20 border border-red-500/30 rounded-xl max-w-xs shadow-lg fade-in">
                    ⚠️ <strong class="text-white">No cierres esta ventana</strong> pues es la encargada de ejecutar el juego en VR.
                </p>

                <!-- NUEVO BOTÓN PARA FORZAR CIERRE -->
                <button id="btn-force-close" onclick="closeApp()" class="hidden mt-4 px-5 py-2 rounded-full bg-red-500/10 border border-red-500/30 hover:bg-red-500/30 hover:border-red-500/50 transition-all duration-300 text-red-200 text-sm font-medium cursor-pointer shadow-lg items-center gap-2 fade-in">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    <span id="force-close-text">Forzar Cierre del Juego</span>
                </button>
            </div>

            <!-- VISTA 3: ERROR INTEGRADO -->
            <div id="error-view" class="hidden w-full max-w-md flex-col items-center justify-center fade-in pointer-events-auto">
                <div class="bg-red-500/10 border border-red-500/30 p-4 rounded-full mb-4 shadow-[0_0_20px_rgba(239,68,68,0.2)] animate-pulse">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-12 h-12 text-red-400"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                </div>
                
                <div class="w-full text-center">
                    <h2 id="error-title" class="text-white font-bold text-xl mb-3 drop-shadow-md">No se pudo iniciar</h2>
                    
                    <div class="bg-black/30 border border-white/10 rounded-xl p-4 mb-4 backdrop-blur-sm text-left">
                        <p class="text-red-300 text-xs font-bold uppercase tracking-wider mb-1 flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> 
                            <span id="error-detail-label">Detalle del Error</span>
                        </p>
                        <p id="error-message" class="text-white/90 text-sm mb-3 font-medium"></p>

                        <p class="text-blue-300 text-xs font-bold uppercase tracking-wider mb-1 flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg> 
                            <span id="error-hint-label">Sugerencia</span>
                        </p>
                        <p id="error-hint" class="text-blue-100/80 text-sm"></p>
                    </div>
                </div>

                <button onclick="resetUI()" id="btn-error-container" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/30 transition-all duration-300 text-white font-medium cursor-pointer shadow-lg flex items-center justify-center gap-2">
                    <span id="btn-error-icon-container">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    </span>
                    <span id="btn-error-back">Volver al Menú</span>
                </button>
            </div>

        </div>
    </main>

    <script>
        // --- MOTOR DE ICONOS OFFLINE (SVG INLINE) ---
        const SVGS = {
            loader: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
            gamepad: '<line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/>',
            monitorPlay: '<rect width="20" height="14" x="2" y="3" rx="2"/><path d="M12 17v4"/><path d="M8 21h8"/><path d="m10 7 5 3-5 3Z"/>',
            headset: '<path d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5Zm0 0a9 9 0 1 1 18 0m0 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3Z"/><path d="M21 16v2a4 4 0 0 1-4 4h-5"/>',
            x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'
        };

        function getIcon(name, cls) {
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}">${SVGS[name]}</svg>`;
        }

        // ── Internacionalización (i18n) ──────────────────────────────────────
        let currentLang = 'es'; 
        let currentLaunchMode = 'vr';
        
        const translations = {
            es: {
                statusSelect: "Selecciona el modo de juego", statusVR: "MODO REALIDAD VIRTUAL", statusFlat: "MODO ORIGINAL (FLAT)",
                statusRunning: "JUEGO EN EJECUCIÓN", checkingFiles: "VERIFICANDO ARCHIVOS...", btnVR: "Iniciar en Realidad Virtual",
                descVR: "Inyecta UEVR automáticamente", btnFlat: "Jugar Original (Flat)", descFlat: "Inicia el juego base sin mods",
                btnCancel: "Cancelar", vrStarting: "Iniciando juego e inyectando motor...",
                vrWarning: '⚠️ <strong class="text-white">No cierres esta ventana</strong> pues es la encargada de ejecutar el juego en VR.',
                errorTitle: "No se pudo iniciar", errorDetail: "Detalle del Error", errorHint: "Sugerencia", errorBack: "Volver al Menú",
                errorClose: "Cerrar Launcher", flatStarting: "Iniciando juego base...", vrPlaying: "Indigo Park VR Jugando",
                errorStatus: "ERROR DETECTADO", errorDefaultMsg: "Ocurrió un error desconocido al intentar abrir el juego.",
                errorDefaultHint: "Verifica que el juego y los archivos estén correctamente ubicados.",
                forceClose: "Forzar Cierre del Juego"
            },
            en: {
                statusSelect: "Select game mode", statusVR: "VIRTUAL REALITY MODE", statusFlat: "ORIGINAL MODE (FLAT)",
                statusRunning: "GAME RUNNING", checkingFiles: "CHECKING FILES...", btnVR: "Launch in Virtual Reality",
                descVR: "Injects UEVR automatically", btnFlat: "Play Original (Flat)", descFlat: "Starts base game without mods",
                btnCancel: "Cancel", vrStarting: "Starting game and injecting engine...",
                vrWarning: '⚠️ <strong class="text-white">Do not close this window</strong> as it handles the VR execution.',
                errorTitle: "Could not start", errorDetail: "Error Detail", errorHint: "Suggestion", errorBack: "Back to Menu",
                errorClose: "Close Launcher", flatStarting: "Starting base game...", vrPlaying: "Indigo Park VR Playing",
                errorStatus: "ERROR DETECTED", errorDefaultMsg: "An unknown error occurred while trying to open the game.",
                errorDefaultHint: "Verify that the game and files are correctly located.",
                forceClose: "Force Close Game"
            }
        };

        function applyTranslations() {
            const lang = translations[currentLang] || translations['es'];
            
            document.getElementById('checking-text').textContent = lang.checkingFiles;
            document.getElementById('btn-vr-title').textContent = lang.btnVR;
            document.getElementById('btn-vr-desc').textContent = lang.descVR;
            document.getElementById('btn-flat-title').textContent = lang.btnFlat;
            document.getElementById('btn-flat-desc').textContent = lang.descFlat;
            document.getElementById('btn-cancel').textContent = lang.btnCancel;
            document.getElementById('vr-status-text').textContent = lang.vrStarting;
            document.getElementById('vr-warning-text').innerHTML = lang.vrWarning;
            document.getElementById('error-title').textContent = lang.errorTitle;
            document.getElementById('error-detail-label').textContent = lang.errorDetail;
            document.getElementById('error-hint-label').textContent = lang.errorHint;
            document.getElementById('btn-error-back').textContent = lang.errorBack;
            document.getElementById('force-close-text').textContent = lang.forceClose;
            document.documentElement.lang = currentLang;
        }

        // ── Lógica de Inicio y Conexión con Python ───────────────────────────
        window.addEventListener("pywebviewready", async function() {
            if (window.pywebview && window.pywebview.api) {
                currentLang = await window.pywebview.api.get_language();
                if (currentLang !== 'es' && currentLang !== 'en') currentLang = 'es';
                applyTranslations();

                const checkResult = await window.pywebview.api.check_files();
                
                const checkingView = document.getElementById('checking-view');
                checkingView.classList.add('hidden');
                checkingView.classList.remove('flex');

                if (checkResult.status === "success") {
                    document.getElementById('status-text').textContent = translations[currentLang].statusSelect;
                    const mainMenu = document.getElementById('main-menu');
                    mainMenu.classList.remove('hidden');
                    mainMenu.classList.add('flex');
                } else {
                    showInitialError(checkResult.message, checkResult.hint);
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            applyTranslations();
            setTimeout(() => {
                if (!window.pywebview) {
                    document.getElementById('checking-view').classList.add('hidden');
                    document.getElementById('checking-view').classList.remove('flex');
                    document.getElementById('status-text').textContent = translations[currentLang].statusSelect;
                    document.getElementById('main-menu').classList.remove('hidden');
                    document.getElementById('main-menu').classList.add('flex');
                }
            }, 1500);
        });

        // ── Drag ──────────────────────────────────────────────────────────────
        document.addEventListener('mousedown', function (e) {
            if (e.button !== 0) return;                          
            if (e.target.closest('button, a, input, select')) return; 
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.start_drag();               
            }
        });

        // ── Acciones ─────────────────────────────────────────────────────────
        function closeApp() {
            if (window.pywebview) window.pywebview.api.close_app();
        }

        async function launchGame(mode) {
            const lang = translations[currentLang];
            const mainMenu   = document.getElementById('main-menu');
            const loadingVr  = document.getElementById('loading-vr');
            const statusText = document.getElementById('status-text');
            const vrStatusText = document.getElementById('vr-status-text');
            
            // Ocultar botón force-close al inicio de la carga por si acaso
            const btnForceClose = document.getElementById('btn-force-close');
            if (btnForceClose) {
                btnForceClose.classList.add('hidden');
                btnForceClose.classList.remove('flex');
            }

            currentLaunchMode = mode;
            mainMenu.classList.add('hidden');
            mainMenu.classList.remove('flex');

            if (mode === 'vr') {
                statusText.textContent = lang.statusVR;
                vrStatusText.textContent = lang.vrStarting;
                loadingVr.classList.remove('hidden');
                loadingVr.classList.add('flex');

                if (window.pywebview) {
                    const result = await window.pywebview.api.launch_vr();
                    if (result.status === "error") { 
                        showErrorState(result.message, result.hint);
                    }
                    else showVRPlayingState();
                } else {
                    setTimeout(() => { vrStatusText.textContent = "Detectando PID..."; }, 1500);
                    setTimeout(showVRPlayingState, 3000);
                }

            } else if (mode === 'flat') {
                statusText.textContent = lang.statusFlat;
                loadingVr.classList.remove('hidden');
                loadingVr.classList.add('flex');

                const pulseRing = document.querySelector('.pulse-ring');
                if (pulseRing) pulseRing.className = "absolute w-40 h-40 bg-blue-500/20 rounded-full blur-2xl animate-pulse";

                document.getElementById('main-icon-container').innerHTML = getIcon('monitorPlay', 'w-16 h-16 text-blue-200');

                const sc = document.getElementById('vr-status-container');
                if (sc) sc.className = "flex items-center gap-2 text-blue-300 font-medium bg-blue-500/10 px-4 py-2 rounded-full border border-blue-500/20";

                vrStatusText.textContent = lang.flatStarting;

                if (window.pywebview) {
                    const result = await window.pywebview.api.launch_flat();
                    if (result.status === "error") { 
                        showErrorState(result.message, result.hint);
                    } else {
                        showVRPlayingState();
                    }
                }
            }
        }

        function showVRPlayingState() {
            const lang = translations[currentLang];
            const vrStatusText = document.getElementById('vr-status-text');
            const vrWarning    = document.getElementById('vr-warning-text');
            const statusText   = document.getElementById('status-text');
            const pulseRing    = document.querySelector('.pulse-ring');
            const sc           = document.getElementById('vr-status-container');
            const btnForceClose = document.getElementById('btn-force-close');

            statusText.textContent = lang.statusRunning;
            vrStatusText.textContent = lang.vrPlaying;

            if (sc) sc.className = "flex items-center gap-2 text-green-300 font-medium bg-green-500/10 px-6 py-2.5 rounded-full border border-green-500/30 shadow-[0_0_15px_rgba(74,222,128,0.2)] fade-in";
            
            document.getElementById('vr-spinner-container').innerHTML = getIcon('gamepad', 'w-4 h-4');
            document.getElementById('main-icon-container').innerHTML = getIcon(currentLaunchMode === 'flat' ? 'monitorPlay' : 'headset', 'w-16 h-16 text-green-300');

            if (pulseRing) pulseRing.className = "absolute w-40 h-40 bg-green-500/30 rounded-full blur-2xl pulse-ring";
            
            if (vrWarning) { 
                vrWarning.classList.remove('hidden'); 
                vrWarning.classList.add('block'); 
            }
            if (btnForceClose) {
                btnForceClose.classList.remove('hidden');
                btnForceClose.classList.add('flex');
            }
        }

        function showInitialError(message, hint) {
            showErrorState(message, hint);
            const lang = translations[currentLang];
            
            const btnContainer = document.getElementById('btn-error-container');
            btnContainer.setAttribute('onclick', 'closeApp()');
            
            const btnText = document.getElementById('btn-error-back');
            btnText.textContent = lang.errorClose;
            
            document.getElementById('btn-error-icon-container').innerHTML = getIcon('x', 'w-5 h-5');
        }

        function showErrorState(message, hint) {
            const lang = translations[currentLang];
            const loadingVr = document.getElementById('loading-vr');
            const errorView = document.getElementById('error-view');
            const statusText = document.getElementById('status-text');
            
            loadingVr.classList.add('hidden');
            loadingVr.classList.remove('flex');

            errorView.classList.remove('hidden');
            errorView.classList.add('flex');

            statusText.textContent = lang.errorStatus;
            
            document.getElementById('error-message').textContent = message || lang.errorDefaultMsg;
            document.getElementById('error-hint').textContent = hint || lang.errorDefaultHint;
        }

        function resetUI() {
            const lang = translations[currentLang];
            const mainMenu  = document.getElementById('main-menu');
            const loadingVr = document.getElementById('loading-vr');
            const errorView = document.getElementById('error-view');
            const btnForceClose = document.getElementById('btn-force-close');

            mainMenu.classList.remove('hidden');
            mainMenu.classList.add('flex');
            
            loadingVr.classList.add('hidden');
            loadingVr.classList.remove('flex');
            errorView.classList.add('hidden');
            errorView.classList.remove('flex');
            if (btnForceClose) {
                btnForceClose.classList.add('hidden');
                btnForceClose.classList.remove('flex');
            }

            document.getElementById('status-text').textContent = lang.statusSelect;
            
            document.getElementById('main-icon-container').innerHTML = getIcon('headset', 'w-16 h-16 text-indigo-200');
            document.getElementById('vr-spinner-container').innerHTML = getIcon('loader', 'w-4 h-4 animate-spin');
        }
    </script>
</body>
</html>
